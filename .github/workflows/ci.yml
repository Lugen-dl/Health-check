on:
    schedule:
        - cron: "0 8,16 * *  *" #Runs every minute, at 08:00 and 16:00
    workflow_dispatch:

jobs:
    automation-stat-checking:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: Run code
              run: |
                docker compose up -d --build
            
            - name: Show statistics
              run: |
               sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2})?)?[mGK]//g" ./logs/* >> $GITHUB_STEP_SUMMARY
